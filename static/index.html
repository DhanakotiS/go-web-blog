<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-bottom: 15px;
        }

        .subtitle {
            margin-bottom: 40px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-links .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Home Page</h1>
        <p class="subtitle">Choose an option to continue</p>
        <div class="nav-links">
            <a href="/login" class="btn btn-large">
                <span class="icon">🔐</span>Login
            </a>
            <a href="/signup" class="btn btn-large">
                <span class="icon">📝</span>Sign Up
            </a>    
        </div>
    </div>
</body>
</html>
